<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Desafio das Sequências - PG</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 80%;
      font-size: 16px;
      cursor: pointer;
    }

    #resultado {
      font-weight: bold;
      margin-top: 15px;
    }

    .instrucoes {
      font-size: 14px;
      margin-bottom: 15px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎮 Desafio das Sequências</h1>

    <p class="instrucoes">
      Resolva os desafios de Progressão Geométrica (PG). 
      Escolha a alternativa correta e teste seus conhecimentos!
    </p>

    <p id="pergunta"></p>

    <div class="botoes">
      <button class="opcao" onclick="responder(0)"></button>
      <button class="opcao" onclick="responder(1)"></button>
      <button class="opcao" onclick="responder(2)"></button>
    </div>

    <p id="resultado"></p>

    <button onclick="reiniciarJogo()">🔄 Jogar novamente</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
